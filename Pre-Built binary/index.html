<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <center>
        <h1> Remote PC controler </h1>
    

    <br>
    <br>
    
    
    <div class="buttons">

        <button class="switch" id="killSwitch">
            Shutdown PC
        </button>

        <button class="switch" id="sleepSwitch">
            Sleep Mode
        </button>

        <button class="switch" id="muteSwitch">
            Mute Pc
        </button>

        <button class="switch" id="muteSwitch">
            Max volume
        </button>

    </div>

    <h3>Volume slider</h3>
    <div class="slidecontainer">
        <input type="range" min="1" max="100" value="50" class="slider" id="range">
    </div>
    </center>

    <script src="script.js"></script>
</body>
